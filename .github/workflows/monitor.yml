name: Trump Truth Social Monitor

on:
  push:
    branches: [ main ]
  schedule:
    # Runs automatically every 5 minutes (the fastest free rate allowed by GitHub)
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser deep-translator requests beautifulsoup4 playwright
        playwright install chromium

    - name: Execute Bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python bot.py

    - name: Commit and Push Tracked Posts List
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add sent_posts.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update tracked posts list [skip ci]" && git push)
